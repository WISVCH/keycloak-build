name: Build and Publish
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  compile:
    name: Compile Provider Jar
    runs-on: ubuntu-latest
    outputs:
      keycloak_version: ${{ steps.versions.outputs.keycloak_version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up JDK 21 for x64
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Resolve Keycloak version from pom.xml
        id: versions
        run: |
          KEYCLOAK_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=keycloak.version)"
          echo "keycloak_version=${KEYCLOAK_VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Compile with configured dependency versions
        run: mvn -B -ntp clean package -DskipTests
      - name: Upload provider jar
        uses: actions/upload-artifact@v4
        with:
          name: provider-jar
          path: target/keycloak-wisvch-custom-providers.jar
          if-no-files-found: error

  docker-build:
    name: Build Docker Image (No Push)
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Download provider jar
        uses: actions/download-artifact@v4
        with:
          name: provider-jar
          path: target
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          build-args: |
            KEYCLOAK_VERSION=${{ needs.compile.outputs.keycloak_version }}

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [compile, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Download provider jar
        uses: actions/download-artifact@v4
        with:
          name: provider-jar
          path: target
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wisvch/keycloak-build
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KEYCLOAK_VERSION=${{ needs.compile.outputs.keycloak_version }}
